name: dart_monty_ide
description: "A mini-python IDE built with dart_monty."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  cupertino_icons: ^1.0.8
  dart_duckdb: ^1.4.4
  dart_monty:
    path: ../dart_monty
  dart_monty_core:
    path: ../dart_monty_core
  dart_monty_hhg:
    path: ../dart_monty_labs/packages/dart_monty_hhg
  file: ^7.0.0
  hhg_dataframe:
    path: ../dart_monty_labs/packages/hhg_dataframe
  hhg_duckdb:
    path: ../dart_monty_labs/packages/hhg_duckdb
  hhg_geoengine:
    path: ../dart_monty_labs-hhg-geoengine/packages/hhg_geoengine
  hhg_flutter_map:
    path: ../dart_monty_labs-hhg-map/packages/hhg_flutter_map
  hhg_map:
    path: ../dart_monty_labs-hhg-map/packages/hhg_map
  hhg_svg:
    path: ../dart_monty_labs/packages/hhg_svg
  flutter:
    sdk: flutter
  flutter_markdown_plus: ^1.0.0
  http: ^1.2.0
  markdown: ^7.3.1
  ollama_dart: ^2.1.0
  open_responses: ^0.3.2
  path: ^1.9.0
  path_provider: ^2.1.0
  re_editor: ^0.8.0
  re_highlight: ^0.0.3
  rxdart: ^0.28.0
  url_launcher: ^6.3.0
  jovial_svg: ^1.1.29

dependency_overrides:
  dart_monty_core:
    path: ../dart_monty_core
  dart_monty_hhg:
    path: ../dart_monty_labs/packages/dart_monty_hhg
  isolate_manager: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
  assets:
    - packages/dart_monty_core/assets/dart_monty_core_bridge.js
    - packages/dart_monty_core/assets/dart_monty_core_native.wasm
    - packages/dart_monty_core/assets/dart_monty_core_worker.js
