name: dart_monty_ide
description: "A mini-python IDE built with dart_monty."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  cupertino_icons: ^1.0.8
  dart_monty:
    path: ../dart_monty
  dart_monty_core:
    path: ../dart_monty_core
  file: ^7.0.0
  flutter:
    sdk: flutter
  flutter_markdown: ^0.7.3+1
  http: ^1.2.0
  ollama_dart: ^0.1.0
  open_responses: ^0.3.2
  path: ^1.9.0
  path_provider: ^2.1.0
  re_editor: ^0.8.0
  re_highlight: ^0.0.3

dependency_overrides:
  dart_monty_core:
    path: ../dart_monty_core
  isolate_manager: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
  assets:
    - packages/dart_monty_core/assets/dart_monty_core_bridge.js
    - packages/dart_monty_core/assets/dart_monty_core_native.wasm
    - packages/dart_monty_core/assets/dart_monty_core_worker.js
